<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>BALOSCO 🛒</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Cart</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Welcome to My Online Shop</h2>
    <p>Best products at affordable prices</p>
</section>
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
</div>
<section class="products">

    <div class="product">
        <a href="product.html?id=1">
            <img src="image/t-shirt.jpg" alt="T-Shirt">
            <h3>T-Shirt</h3>
            <p>₦5,000</p>
        </a>
        <button class="add-to-cart">Add to Cart</button>
    </div>

    <div class="product">
        <a href="product.html?id=2">
            <img src="image/images.jpg" alt="Phone">
            <h3>Phone</h3>
            <p>₦15,000</p>
        </a>
        <button class="add-to-cart">Add to Cart</button>
    </div>

    <div class="product">
        <a href="product.html?id=3">
            <img src="image/shoes.jpg" alt="Shoes">
            <h3>Shoes</h3>
            <p>₦15,000</p>
        </a>
        <button class="add-to-cart">Add to Cart</button>
    </div>

    <div class="product">
        <a href="product.html?id=4">
            <img src="image/generator.jpg" alt="Generator">
            <h3>Generator</h3>
            <p>₦350,000</p>
        </a>
        <button class="add-to-cart">Add to Cart</button>
    </div>

    <div class="product">
        <a href="product.html?id=5">
            <img src="image/smartwatch.jpg" alt="Smart Watch">
            <h3>Smart Watch</h3>
            <p>₦30,000</p>
        </a>
        <button class="add-to-cart">Add to Cart</button>
    </div>

    <div class="product">
        <a href="product.html?id=6">
            <img src="image/headset.jpg" alt="Headset">
            <h3>Headset</h3>
            <p>₦12,000</p>
        </a>
        <button class="add-to-cart">Add to Cart</button>
    </div>

    <div class="product">
        <a href="product.html?id=7">
            <img src="image/backpack.jpg" alt="Backpack">
            <h3>Backpack</h3>
            <p>₦18,000</p>
        </a>
        <button class="add-to-cart">Add to Cart</button>
    </div>

</section>

</section>

<footer>
    <p>© 2026 Felix Store. All rights reserved.</p>
</footer>

<script src="script.js"></script>

</html>
